<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />
  <title>Admin — Darkgroove Roastery</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background-color: #161616;
      color: #F2F1ED;
      -webkit-font-smoothing: antialiased;
    }

    #admin-root {
      min-height: 100vh;
    }

    /* Gate screen shown before JS initializes */
    .gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    .gate__spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(242, 241, 237, 0.1);
      border-top-color: #710014;
      border-radius: 50%;
      animation: gate-spin 0.7s linear infinite;
    }

    .gate__text {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(242, 241, 237, 0.2);
    }

    @keyframes gate-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div id="admin-root">
    <div class="gate">
      <div class="gate__spinner"></div>
      <span class="gate__text">Verifying session...</span>
    </div>
  </div>

  <script type="module">
    import { auth }             from "./firebaseConfig.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { renderAdminLogin }   from "./AdminLogin.js";
    import { renderAdminDashboard } from "./AdminDashboard.js";

    const root = document.getElementById("admin-root");

    onAuthStateChanged(auth, (user) => {
      if (user) {
        renderAdminDashboard(root, user);
      } else {
        renderAdminLogin(root);
      }
    });
  </script>

</body>
</html>
